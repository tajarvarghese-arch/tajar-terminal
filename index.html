<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TAJAR" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;500;700&display=swap" rel="stylesheet">
    <meta name="description" content="TAJAR TERMINAL — a brutalist Bloomberg-style command terminal: live portfolio, holding news, schedule, and execution list." />
    <meta name="theme-color" content="#0a0908" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TAJAR OS — Personal Command Center" />
    <meta property="og:description" content="Personal signal, without the noise." />
    <meta property="og:image" content="/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TAJAR OS — Personal Command Center" />
    <meta name="twitter:description" content="Personal signal, without the noise." />
    <meta name="twitter:image" content="/og.png" />
    <title>TAJAR TERMINAL</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; }
      body {
        overflow-x: hidden;
        /* stop iOS Safari from auto-inflating text in wide containers (tape headlines) */
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
      }
      /* Consolas on Windows/Mac; Inconsolata web-fallback keeps the same look on iPhone (no Consolas on iOS). */
      body {
        background: #0a0908;
        color: #ece3d0;
        font-family: Consolas, 'Inconsolata', ui-monospace, 'SF Mono', Menlo, monospace;
        -webkit-font-smoothing: antialiased;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
